name: 检查 realm 版本更新

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v5

      - name: 设置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: 安装依赖
        run: npm install

      - name: 运行检测脚本
        env:
          TARGET_REPO: zhboner/realm
        run: node checkVersion.js

      - name: 提交并推送更新
        run: |
          if git diff --quiet -- realm-v.txt; then
            echo "无版本更新，不提交。"
            exit 0
          fi

          echo "发现版本更新，正在提交..."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add realm-v.txt package-lock.json
          git commit -m "chore: update realm version"
          git push
      - name: 心跳提交（每周一次）
        run: |
          if [ "$(date +%u)" -ne 1 ]; then
            echo "不是周一，不执行心跳"
            exit 0
          fi

          echo "$(date)" > .heartbeat

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .heartbeat

          if git diff --cached --quiet; then
            echo "没有变化，不提交"
          else
            git commit -m "chore: weekly heartbeat"
            git push
          fi
